name: SK monitor daily

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python collect.py
      - name: Commit vystupy
        run: |
          git config user.name "sk-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          git commit -m "SK monitor ${{ github.run_id }}" || echo "Nic nove."
          git push
